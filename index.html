<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atomise CRM</title>

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9; }
    h1 { margin-bottom: 20px; }

    input, button {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .section { margin-top: 30px; }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 8px;
      width: 200px;
      background-color: #fff;
      box-shadow: 1px 1px 5px rgba(0,0,0,0.1);
    }

    .card h4 { margin: 0 0 5px 0; }
    .card p { margin: 0; font-size: 14px; color: #555; }
  </style>
</head>

<body>

  <h1>Atomise CRM</h1>

  <!-- DEALS SECTION -->
  <div class="section">
    <h2>Deals</h2>

    <input type="text" id="dealName" placeholder="Enter Deal Name" />
    <button id="addDealBtn">Add Deal</button>

    <div id="crm-deals" class="grid"></div>
  </div>

  <!-- CONTACTS SECTION -->
  <div class="section">
    <h2>Contacts</h2>

    <input type="text" id="contactName" placeholder="Name" />
    <input type="email" id="contactEmail" placeholder="Email" />
    <input type="text" id="contactPhone" placeholder="Phone" />
    <button id="addContactBtn">Add Contact</button>

    <div id="contacts-list" class="grid"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = "https://navwmcgyspmkaedpxmmp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdndtY2d5c3Bta2FlZHB4bW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjMwMjEsImV4cCI6MjA4OTg5OTAyMX0.rUxl50XPC6HxjCNyd7HxEz24Dd_mSUbLIvl2uYP0PXE";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ---------------- DEALS ----------------
    const dealContainer = document.getElementById('crm-deals');
    const dealInput = document.getElementById('dealName');
    const addDealBtn = document.getElementById('addDealBtn');

    async function fetchDeals() {
      const { data, error } = await supabase
        .from('deals')
        .select('*')
        .order('id', { ascending: true });

      if (error) return console.error(error);

      dealContainer.innerHTML = '';

      data.forEach(deal => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h4>${deal.deal_name}</h4>
          <p>Stage: ${deal.stage || 'New'}</p>
        `;
        dealContainer.appendChild(card);
      });
    }

    async function addDeal() {
      const name = dealInput.value.trim();
      if (!name) return alert('Enter deal name');

      const { error } = await supabase
        .from('deals')
        .insert([{ deal_name: name, stage: 'New' }]);

      if (error) return alert('Error adding deal');

      dealInput.value = '';
      fetchDeals();
    }

    addDealBtn.addEventListener('click', addDeal);

    // ---------------- CONTACTS ----------------
    const contactContainer = document.getElementById('contacts-list');
    const nameInput = document.getElementById('contactName');
    const emailInput = document.getElementById('contactEmail');
    const phoneInput = document.getElementById('contactPhone');
    const addContactBtn = document.getElementById('addContactBtn');

    async function fetchContacts() {
      const { data, error } = await supabase
        .from('contacts')
        .select('*')
        .order('id', { ascending: true });

      if (error) return console.error(error);

      contactContainer.innerHTML = '';

      data.forEach(contact => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h4>${contact.name}</h4>
          <p>${contact.email}</p>
          <p>${contact.phone}</p>
        `;
        contactContainer.appendChild(card);
      });
    }

    async function addContact() {
      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const phone = phoneInput.value.trim();

      if (!name) return alert('Enter name');

      const { error } = await supabase
        .from('contacts')
        .insert([{ name, email, phone }]);

      if (error) return alert('Error adding contact');

      nameInput.value = '';
      emailInput.value = '';
      phoneInput.value = '';

      fetchContacts();
    }

    addContactBtn.addEventListener('click', addContact);

    // ---------------- LOAD ----------------
    fetchDeals();
    fetchContacts();

  </script>

</body>
</html>
