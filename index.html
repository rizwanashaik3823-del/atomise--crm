<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atomise CRM</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f9f9f9; }

    input, select, button {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .card {
      width: 200px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    }
  </style>
</head>

<body>

<h1>Atomise CRM</h1>

<!-- DEALS -->
<h2>Deals</h2>

<input id="dealName" placeholder="Deal Name">
<select id="contactSelect"></select>
<button id="addDealBtn">Add Deal</button>

<div id="crm-deals" class="grid"></div>

<hr>

<!-- CONTACTS -->
<h2>Contacts</h2>

<input id="contactName" placeholder="Name">
<input id="contactEmail" placeholder="Email">
<input id="contactPhone" placeholder="Phone">
<button id="addContactBtn">Add Contact</button>

<div id="contacts-list" class="grid"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://navwmcgyspmkaedpxmmp.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdndtY2d5c3Bta2FlZHB4bW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjMwMjEsImV4cCI6MjA4OTg5OTAyMX0.rUxl50XPC6HxjCNyd7HxEz24Dd_mSUbLIvl2uYP0PXE";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---------- DEALS ----------
const dealContainer = document.getElementById('crm-deals');
const dealInput = document.getElementById('dealName');

async function fetchDeals() {
  const { data, error } = await supabase
    .from('deals')
    .select('*, contacts(name)')
    .order('id', { ascending: true });

  if (error) return console.error(error);

  dealContainer.innerHTML = '';

  data.forEach(deal => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <h4>${deal.deal_name}</h4>
      <p>Stage: ${deal.stage}</p>
      <p>Contact: ${deal.contacts?.name || 'No Contact'}</p>
    `;

    dealContainer.appendChild(card);
  });
}

async function addDeal() {
  const name = dealInput.value.trim();
  const contactId = document.getElementById('contactSelect').value;

  if (!name) return alert('Enter deal name');

  const { error } = await supabase
    .from('deals')
    .insert([{ deal_name: name, stage: 'Lead', contact_id: contactId }]);

  if (error) return alert('Error adding deal');

  dealInput.value = '';
  fetchDeals();
}

document.getElementById('addDealBtn').addEventListener('click', addDeal);

// ---------- CONTACTS ----------
const contactContainer = document.getElementById('contacts-list');

async function fetchContacts() {
  const { data } = await supabase.from('contacts').select('*');

  contactContainer.innerHTML = '';

  data.forEach(contact => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <h4>${contact.name}</h4>
      <p>${contact.email}</p>
      <p>${contact.phone}</p>
    `;

    contactContainer.appendChild(card);
  });
}

async function addContact() {
  const name = document.getElementById('contactName').value.trim();
  const email = document.getElementById('contactEmail').value.trim();
  const phone = document.getElementById('contactPhone').value.trim();

  if (!name) return alert('Enter name');

  const { error } = await supabase
    .from('contacts')
    .insert([{ name, email, phone }]);

  if (error) return alert('Error adding contact');

  document.getElementById('contactName').value = '';
  document.getElementById('contactEmail').value = '';
  document.getElementById('contactPhone').value = '';

  fetchContacts();
  loadDropdown();
}

document.getElementById('addContactBtn').addEventListener('click', addContact);

// ---------- DROPDOWN ----------
async function loadDropdown() {
  const { data } = await supabase.from('contacts').select('*');

  const dropdown = document.getElementById('contactSelect');
  dropdown.innerHTML = '<option value="">Select Contact</option>';

  data.forEach(contact => {
    const option = document.createElement('option');
    option.value = contact.id;
    option.textContent = contact.name;
    dropdown.appendChild(option);
  });
}

// ---------- LOAD ----------
fetchDeals();
fetchContacts();
loadDropdown();

</script>

</body>
</html>
