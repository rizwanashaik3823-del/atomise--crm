<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atomise CRM</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f9f9f9; }

    input, select, button {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .card {
      width: 200px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    }
  </style>
</head>

<body>

<h1>Atomise CRM</h1>

<!-- DEALS -->
<h2>Deals</h2>

<input id="dealName" placeholder="Deal Name">
<select id="contactSelect"></select>
<button onclick="addDeal()">Add Deal</button>

<div id="crm-deals" class="grid"></div>

<hr>

<!-- CONTACTS -->
<h2>Contacts</h2>

<input id="contactName" placeholder="Name">
<input id="contactEmail" placeholder="Email">
<input id="contactPhone" placeholder="Phone">
<button onclick="addContact()">Add Contact</button>

<div id="contacts-list" class="grid"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://navwmcgyspmkaedpxmmp.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdndtY2d5c3Bta2FlZHB4bW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjMwMjEsImV4cCI6MjA4OTg5OTAyMX0.rUxl50XPC6HxjCNyd7HxEz24Dd_mSUbLIvl2uYP0PXE";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---------- GLOBAL DATA ----------
let allContacts = [];

// ---------- LOAD CONTACTS ----------
async function fetchContacts() {
  const { data, error } = await supabase.from('contacts').select('*');

  if (error) {
    console.error(error);
    return;
  }

  allContacts = data;

  const container = document.getElementById('contacts-list');
  container.innerHTML = '';

  data.forEach(contact => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <h4>${contact.name}</h4>
      <p>${contact.email}</p>
      <p>${contact.phone}</p>
    `;
    container.appendChild(div);
  });

  loadDropdown();
}

// ---------- DROPDOWN ----------
function loadDropdown() {
  const dropdown = document.getElementById('contactSelect');
  dropdown.innerHTML = '<option value="">Select Contact</option>';

  allContacts.forEach(contact => {
    const option = document.createElement('option');
    option.value = contact.id;
    option.textContent = contact.name;
    dropdown.appendChild(option);
  });
}

// ---------- ADD CONTACT ----------
async function addContact() {
  const name = document.getElementById('contactName').value.trim();
  const email = document.getElementById('contactEmail').value.trim();
  const phone = document.getElementById('contactPhone').value.trim();

  if (!name) return alert('Enter name');

  const { error } = await supabase
    .from('contacts')
    .insert([{ name, email, phone }]);

  if (error) return alert('Error adding contact');

  document.getElementById('contactName').value = '';
  document.getElementById('contactEmail').value = '';
  document.getElementById('contactPhone').value = '';

  fetchContacts();
}

// ---------- LOAD DEALS ----------
async function fetchDeals() {
  const { data, error } = await supabase
    .from('deals')
    .select('*')
    .order('id', { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const container = document.getElementById('crm-deals');
  container.innerHTML = '';

  data.forEach(deal => {
    const contact = allContacts.find(c => c.id === deal.contact_id);

    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <h4>${deal.deal_name}</h4>
      <p>Stage: ${deal.stage}</p>
      <p>Contact: ${contact ? contact.name : 'No Contact'}</p>
    `;

    container.appendChild(div);
  });
}

// ---------- ADD DEAL ----------
async function addDeal() {
  const name = document.getElementById('dealName').value.trim();
  const contactId = document.getElementById('contactSelect').value;

  if (!name) return alert('Enter deal name');

  const { error } = await supabase
    .from('deals')
    .insert([{
      deal_name: name,
      stage: 'Lead',
      contact_id: contactId || null
    }]);

  if (error) return alert('Error adding deal');

  document.getElementById('dealName').value = '';

  fetchDeals();
}

// ---------- INITIAL LOAD ----------
async function init() {
  await fetchContacts();
  await fetchDeals();
}

init();

</script>

</body>
</html>
