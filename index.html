<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atomise CRM</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9; }
    h1 { margin-bottom: 20px; }
    input, button { padding: 8px; margin-right: 5px; border-radius: 5px; border: 1px solid #ccc; }
    #crm-deals { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
    .deal-card {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 8px;
      width: 200px;
      background-color: #fff;
      box-shadow: 1px 1px 5px rgba(0,0,0,0.1);
    }
    .deal-card h4 { margin: 0 0 5px 0; }
    .deal-card p { margin: 0; font-size: 14px; color: #555; }
  </style>
</head>
<body>
  <h1>Atomise CRM - Deals</h1>

  <!-- Add New Deal Section -->
  <div>
    <input type="text" id="dealName" placeholder="Enter Deal Name" style="width:200px;" />
    <button id="addDealBtn">Add Deal</button>
  </div>

  <!-- Deals will appear here -->
  <div id="crm-deals"></div>

  <!-- Supabase + CRM Script -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = "https://navwmcgyspmkaedpxmmp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdndtY2d5c3Bta2FlZHB4bW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjMwMjEsImV4cCI6MjA4OTg5OTAyMX0.rUxl50XPC6HxjCNyd7HxEz24Dd_mSUbLIvl2uYP0PXE";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const container = document.getElementById('crm-deals');
    const dealInput = document.getElementById('dealName');
    const addBtn = document.getElementById('addDealBtn');

    // Fetch and display deals
    async function fetchDeals() {
      const { data, error } = await supabase
        .from('deals')
        .select('*')
        .order('id', { ascending: true });

      if (error) {
        console.error('Error fetching deals:', error);
        return;
      }

      container.innerHTML = '';
      data.forEach(deal => {
        const card = document.createElement('div');
        card.className = 'deal-card';
        card.innerHTML = `
          <h4>${deal.deal_name}</h4>
          <p>Stage: ${deal.stage || 'New'}</p>
        `;
        container.appendChild(card);
      });
    }

    // Add a new deal
    async function addDeal() {
      const dealName = dealInput.value.trim();
      if (!dealName) return alert('Please enter a deal name.');

      const { error } = await supabase
        .from('deals')
        .insert([{ deal_name: dealName, stage: 'New' }]);

      if (error) {
        console.error('Error adding deal:', error);
        return alert('Failed to add deal.');
      }

      dealInput.value = '';
      fetchDeals();
    }

    // Event listeners
    addBtn.addEventListener('click', addDeal);
    dealInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') addDeal(); });

    // Load deals on page load
    fetchDeals();
  </script>
</body>
</html>
